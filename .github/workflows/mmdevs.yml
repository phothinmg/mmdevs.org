name: Mmdevs

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - ready_for_review

permissions: {}

jobs:
  validate:
    name: Validate subdomain
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        id: checkout_pr_head
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.SUSEE_BOT_PAT_TOKEN }}
        # source repository
      - uses: actions/checkout@v6
        id: checkout_source_repo
        with:
          repository: suseejs/mmdevs
          path: mmdevs

      - name: Setup Node.js
        id: setup_node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mmdevs/package-lock.json

      - name: Install dependencies
        id: install_dependencies
        run: npm ci
        working-directory: mmdevs

      - name: Build Source
        id: build_source
        run: npm run build
        working-directory: mmdevs

      - name: Check Pull Request
        id: check_pull_request
        env:
          GITHUB_TOKEN: ${{ secrets.SUSEE_BOT_PAT_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CF_ACCOUNT_ID: ${{ secrets.PTM_CF_ACC_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.MMDEVS_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.MMDEVS_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.MMDEVS_R2_BUCKET_NAME }}
        run: |
          node pulls.mjs
        working-directory: mmdevs
